name: telemetry

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate telemetry artifacts
        run: |
          mkdir -p api benchmarks

          cat > api/state.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" width="420" height="120">
            <rect width="100%" height="100%" fill="#0A0A0A"/>
            <text x="14" y="28" fill="#e0e0e0" font-family="monospace" font-size="16">latency: 14ms</text>
            <text x="14" y="52" fill="#e0e0e0" font-family="monospace" font-size="16">updated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")</text>
          </svg>
          SVG

          cat > benchmarks/badge_latency.json <<'JSON'
          {"schemaVersion":1,"label":"write latency","message":"14ms","color":"blue"}
          JSON

      - name: Commit telemetry artifacts
        run: |
          git config user.name "telemetry bot"
          git config user.email "telemetry@users.noreply.github.com"
          git add api/state.svg benchmarks/badge_latency.json
          if ! git diff --cached --quiet; then
            git commit -m "update telemetry artifacts"
            git push
          fi
